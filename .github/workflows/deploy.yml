name: 🚀 Deploy
on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: '50'

      - name: 👀 Read app name
        uses: SebRollen/toml-action@v1.2.0
        id: app_name
        with:
          file: 'fly.toml'
          field: 'app'

      - name: 🎈 Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: 🏷 Determine release version
        id: release
        run: |
          CALVER=$(date -u '+%Y.%m.%d')
          echo "version=$CALVER" >> "$GITHUB_OUTPUT"
          echo "Release version: $CALVER"

      - name: 🚀 Deploy Staging
        if: ${{ github.ref == 'refs/heads/dev' }}
        run: >-
          flyctl deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
          --build-arg RELEASE_VERSION=${{ steps.release.outputs.version }} --app
          ${{ steps.app_name.outputs.value }}-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: 🚀 Deploy Production
        if: ${{ github.ref == 'refs/heads/main' }}
        run: >-
          flyctl deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
          --build-arg RELEASE_VERSION=${{ steps.release.outputs.version }}
          --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} --build-arg
          SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} --build-secret
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

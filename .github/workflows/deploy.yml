name: 🚀 Deploy
on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' }}
    outputs:
      release_version: ${{ steps.release.outputs.version }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: '50'

      - name: 👀 Read app name
        uses: SebRollen/toml-action@v1.2.0
        id: app_name
        with:
          file: 'fly.toml'
          field: 'app'

      - name: 🎈 Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: 🏷 Determine release version
        id: release
        env:
          GIT_REF: ${{ github.ref }}
        run: |
          BASE=$(date -u '+%Y.%m.%d.%H%M%S')
          if [ "$GIT_REF" = "refs/heads/dev" ]; then
            RELEASE="${BASE}-beta"
          else
            RELEASE="$BASE"
          fi
          echo "version=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE"

      - name: 🚀 Deploy Staging
        if: ${{ github.ref == 'refs/heads/dev' }}
        run: >-
          flyctl deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
          --build-arg RELEASE_VERSION=${{ steps.release.outputs.version }} --app
          ${{ steps.app_name.outputs.value }}-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  release:
    name: 📦 Release
    needs: deploy
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.deploy.outputs.release_version }}
      IS_PRERELEASE: ${{ github.ref == 'refs/heads/dev' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🧾 Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 🏷 Create tag
        run: |
          git tag "$RELEASE_VERSION" "${GITHUB_SHA}"
          git push origin "$RELEASE_VERSION"

      - name: ✅ Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ env.IS_PRERELEASE }}

      - name: 🎈 Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: 🚀 Deploy Production
        if: ${{ github.ref == 'refs/heads/main' }}
        run: >-
          flyctl deploy --remote-only --build-arg COMMIT_SHA=${{ github.sha }}
          --build-arg RELEASE_VERSION=${{ steps.release.outputs.version }}
          --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} --build-arg
          SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }} --build-secret
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
